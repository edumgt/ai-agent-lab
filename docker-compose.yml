# 이 파일은 www.edumgt.co.kr 의 에듀엠지티에 저작권이 있습니다
#
# LM Studio AI Agent Lab — Docker Compose
# =========================================
# LM Studio 는 호스트 PC 에서 실행합니다 (포트 1234).
# 컨테이너에서는 LM_STUDIO_URL 환경변수로 호스트를 참조합니다.
#
# 빠른 시작:
#   1. LM Studio 실행 후 모델 로드 (포트 1234)
#   2. docker compose up -d
#   3. http://localhost:8954  (Agent API)
#
# LM_STUDIO_HOST 기본값은 host.docker.internal (Windows/Mac).
# Linux 에서는 --add-host=host.docker.internal:host-gateway 가 자동 적용됩니다.

x-lm-studio: &lm-studio-env
  LM_STUDIO_URL: http://${LM_STUDIO_HOST:-host.docker.internal}:1234/v1
  LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
  LM_STUDIO_MODEL: ${LM_STUDIO_MODEL:-local-model}

services:

  # ── Qdrant 벡터DB (RAG 실습용) ── port 6333 ──────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: lmlab-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── VoiceModelBuilder ── port 8951 ─────────────────────────────────────────
  voice-model-builder:
    build:
      context: ./VoiceModelBuilder
      dockerfile: Dockerfile
    environment:
      <<: *lm-studio-env
      PROJECT_ID: ${VMB_PROJECT_ID:-project001}
      PROJECT_NAME: ${VMB_PROJECT_NAME:-금융 상담 음성 브리핑 스튜디오}
      PROJECT_TRACK: ${VMB_PROJECT_TRACK:-금융-프로젝트-A}
      PROJECT_TOPIC: ${VMB_PROJECT_TOPIC:-금융 상담 음성 브리핑 스튜디오}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8951:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PersonaLLMResponder ── port 8952 ───────────────────────────────────────
  persona-llm-responder:
    build:
      context: ./PersonaLLMResponder
      dockerfile: Dockerfile
    environment:
      <<: *lm-studio-env
      PROJECT_ID: ${PLR_PROJECT_ID:-project002}
      PROJECT_NAME: ${PLR_PROJECT_NAME:-금융 상품 상담 에이전트}
      PROJECT_TRACK: ${PLR_PROJECT_TRACK:-금융-프로젝트-B}
      PROJECT_TOPIC: ${PLR_PROJECT_TOPIC:-금융 상품 상담 에이전트}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8952:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PersonaKnowledgeCustomizer ── port 8953 ────────────────────────────────
  persona-knowledge-customizer:
    build:
      context: ./PersonaKnowledgeCustomizer
      dockerfile: Dockerfile
    environment:
      <<: *lm-studio-env
      PROJECT_ID: ${PKC_PROJECT_ID:-project003}
      PROJECT_NAME: ${PKC_PROJECT_NAME:-금융 지식베이스 커스터마이저}
      PROJECT_TRACK: ${PKC_PROJECT_TRACK:-금융-프로젝트-C}
      PROJECT_TOPIC: ${PKC_PROJECT_TOPIC:-금융 지식베이스 커스터마이저}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8953:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Agent API ── port 8954 ──────────────────────────────────────────────────
  agent-api:
    build:
      context: .
      dockerfile: Agent/Dockerfile
    env_file:
      - Agent/.env
    environment:
      <<: *lm-studio-env
      REPO_ROOT: /srv/repo
      VECTOR_DB_PATH: /srv/vector_db
      VECTOR_COLLECTION: ${VECTOR_COLLECTION:-finance_agent_lab}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      CHUNK_SIZE: ${CHUNK_SIZE:-900}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-6}
      DEFAULT_ORCHESTRATOR: ${DEFAULT_ORCHESTRATOR:-native}
      USER_STORE_MODE: qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_USER_COLLECTION: ${QDRANT_USER_COLLECTION:-agent_users}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-finance-agent-lab}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8954:8000"
    volumes:
      - ./:/srv/repo:ro
      - agent_vector_db:/srv/vector_db
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - default
      - shared-net
    restart: unless-stopped

volumes:
  qdrant_data:
  agent_vector_db:

networks:
  default: {}
  shared-net:
    external: true
