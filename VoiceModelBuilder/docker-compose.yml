services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PROJECT_ID: ${PROJECT_ID:-project001}
      PROJECT_NAME: ${PROJECT_NAME:-금융 상담 음성 브리핑 스튜디오}
      PROJECT_TRACK: ${PROJECT_TRACK:-금융-프로젝트-A}
      PROJECT_TOPIC: ${PROJECT_TOPIC:-금융 상담 음성 브리핑 스튜디오}
    ports:
      - "${APP_HOST_PORT:-9101}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
